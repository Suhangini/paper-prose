<!DOCTYPE html>
<html>
<head>
    <title>Contact - Paper & Prose</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <div class="logo">
        Paper <span>&</span> Prose
        <p class="tagline">Where Stories Come Alive</p>
    </div>

    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact" class="active">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h2>Get in Touch</h2>
</section>

<!-- CONTACT FORM -->
<section class="contact-container">
    <div class="contact-card">
        <h2>📩 Contact Us</h2>

        <form action="/submit" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
        </form>

        {% if request.args.get('success') %}
<div class="popup">
    <div class="popup-card">
        <h2>✅ Message Sent!</h2>
        <p>Thank you for contacting us 💌</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>
{% endif %}

    </div>
</section>

<script>
function closePopup() {
    document.querySelector('.popup').style.display = 'none';
}
setTimeout(() => {
    document.querySelector('.popup').style.display = 'none';
}, 3000);
</script>
</body>
</html>
